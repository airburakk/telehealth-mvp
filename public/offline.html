<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Çevrimdışı — portamed</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: #f1f5f9; color: #334155; }
    .card { text-align: center; padding: 40px 28px; background: #fff; border: 1px solid #e2e8f0; border-radius: 20px; max-width: 360px; margin: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .logo { width: 56px; height: 56px; border-radius: 14px; margin: 0 auto 14px; display: block; }
    h1 { font-size: 18px; color: #0A3F39; margin: 0 0 6px; }
    p { font-size: 14px; line-height: 1.5; margin: 0 0 18px; color: #64748b; }
    button { background: #0E9E97; color: #fff; border: 0; border-radius: 10px; padding: 10px 22px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:hover { background: #0A7D77; }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/icon-192.png" alt="portamed" />
    <h1>İnternet bağlantısı yok</h1>
    <p>Sayfa yüklenemedi. Bağlantınızı kontrol edip tekrar deneyin — sağlık verileriniz güncelliği için her zaman canlı sunucudan alınır.</p>
    <button onclick="location.reload()">Tekrar dene</button>
  </div>
</body>
</html>
