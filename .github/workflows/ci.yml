# CI kapısı (denetim P0 #4) — her push/PR'da tip + birim testi + lint çalışır.
# AMAÇ: canlı klinik uygulamaya test-geçmeden regresyon gitmesin. Birim katmanı DB'siz (tests/unit),
# bu yüzden CI'da güvenlidir; entegrasyon/E2E ayrı config'te (Neon dev branch secret'ı gerektirir) →
# şimdilik opsiyonel iş olarak aşağıda kapalı bırakıldı. Build kapısı Vercel'de zaten çalışır
# (bozuk build deploy'u durdurur); burada tsc + birim testi hızlı ve deterministik kapıdır.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    # prisma generate + db.ts singleton constructor'ı env değişkenlerinin VAR olmasını bekler (bağlantı
    # KURMAZ — generate şemayı okur, testler db'yi mock'lar). Sahte/CI-only değerler yeterli.
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
      SESSION_SECRET: "ci-only-placeholder-secret-not-for-production"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Bağımlılıklar
        run: npm ci
      - name: Prisma client üret
        run: npx prisma generate
      - name: Tip denetimi (tsc)
        run: npx tsc --noEmit
      - name: Birim testleri (DB'siz)
        run: npm test
      # `npm run lint` (= eslint src) — kaynak ağacını denetler (.next build kalıntısı hariç).
      # eslint-config-next@16 React Compiler kuralları eslint.config.mjs'de warn'a çekildi (kademeli
      # benimseme) → gate mevcut kodda EXIT 0 döner; yeni gerçek hatalar (tsc dahil) yine bloklar.
      - name: Lint
        run: npm run lint

  # Entegrasyon testleri — GERÇEK Neon dev branch'e karşı (secrets.TEST_DATABASE_URL; prod'a ASLA).
  # Fork PR'larında secret verilmez → süit skipIf ile atlanır (job yeşil kalır; kapı işlevi yalnız
  # kendi push/PR'larımızda). DATA_ENCRYPTION_KEK bilerek YOK: en kritik sır GitHub'a yayılmaz →
  # KEK isteyen 2 mutlu-yol testi (cases-authz 200'leri) CI'da kendini atlar, deny-yolları tam kapıdır.
  # E2E (Playwright) CI dışında: yavaş + dev branch'e veri biriktirir → yerel koşu (tests/e2e/README.md).
  entegrasyon:
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
      DIRECT_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
      SESSION_SECRET: "ci-only-placeholder-secret-not-for-production"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Bağımlılıklar
        run: npm ci
      - name: Prisma client üret
        run: npx prisma generate
      - name: Entegrasyon testleri (Neon dev branch)
        run: npm run test:integration
